syntax = "proto3";

package inventory.v1;

option go_package = "github.com/AlfariziYasir/transactions/common/proto/inventory";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "google/api/field_behavior.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "validate/validate.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Inventory Service API";
    version: "1.0";
    description: "management product and control warehouse stock";
  };
  security_definitions: {
        security: {
            key: "BearerAuth";
            value: {
                type: TYPE_API_KEY;
                in: IN_HEADER;
                name: "Authorization";
            }
        }
    };
    security: {
        security_requirement: {
            key: "BearerAuth";
            value: {};
        }
    };
};

service InventoryService {
  rpc Create(CreateProductRequest) returns (DynamicResponse) {
    option (google.api.http) = {
      post: "/v1/admin/products"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "product";
      summary: "create a new product";
    };
  }

  rpc Update(UpdateProductRequest) returns (DynamicResponse) {
    option (google.api.http) = {
      put: "/v1/admin/products/{id}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "product";
      summary: "update existing product details";
    };
  }

  rpc Delete(DeleteProductRequest) returns (DynamicResponse) {
    option (google.api.http) = {
      delete: "/v1/admin/products/{id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "product";
      summary: "soft delete a product";
    };
  }

  // =======================
  // domain stock management
  // =======================
  rpc ReserveStock(StockRequest) returns (DynamicResponse) {}
  
  rpc AdjustStock(AdjustStockRequest) returns (DynamicResponse) {
    option (google.api.http) = {
      post: "/v1/admin/products/{product_id}/stock-adjust"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "stock";
      summary: "manual stock adjustment (In/Out)";
    };
  }

  rpc StockAvailability(CheckStockRequest) returns (CheckStockResponse) {
    option (google.api.http) = {
      post: "/v1/products/check-stock"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "stock";
      summary: "validate stock availability before order creation";
    };
  }

  rpc Get(GetProductRequest) returns (Product) {
    option (google.api.http) = {
      get: "/v1/products/{id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "catalog";
      summary: "et single product details";
    };
  }

  rpc List(ListProductsRequest) returns (ListProductsResponse) {
    option (google.api.http) = {
      get: "/v1/products"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "catalog";
      summary: "list products with pagination and search";
    };
  }

  rpc GetProducts(BatchGetProductsRequest) returns (BatchGetProductsResponse) {
    option (google.api.http) = {
      post: "/v1/products/batch"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "catalog";
      summary: "get multiple products by IDs";
    };
  }
}

message Product {
  string id = 1;
  string sku = 2;
  string name = 3;
  string description = 4;
  string price = 5;
  int32 quantity = 6;
  int32 reserved_quantity = 7;
  bool is_active = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message CreateProductRequest {
  string sku = 1 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string.min_len = 3
  ];
  string name = 2 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string.min_len = 3
  ];
  string description = 3 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string.min_len = 10
  ];
  string price = 4 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string = {
      pattern: "^[0-9]+(\\.[0-9]{1,2})?$",
      min_len: 1
    }
  ];
  int32 initial_stock = 5 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).int32.gt = 0
  ]; 
}

message UpdateProductRequest {
  string id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string.uuid = true
  ];
  string name = 2 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string.min_len = 3
  ];
  string description = 3 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string.min_len = 10
  ];
  string price = 4 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string = {
      pattern: "^[0-9]+(\\.[0-9]{1,2})?$",
      min_len: 1
    }
  ];
}

message DeleteProductRequest {
  string id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string.uuid = true
  ];
}

message GetProductRequest {
  string id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string.uuid = true
  ];
}

message ListProductsRequest {
  int32 page_size = 1 [
      (google.api.field_behavior) = REQUIRED,
      (validate.rules).int32.gt = 0
  ];
  string page_token = 2 [
      (google.api.field_behavior) = REQUIRED,
      (validate.rules).string.min_len = 1
  ];
  bool status = 3;
  string name = 4;
}

message ProductItems {
  string id = 1;
  string sku = 2;
  string name = 3;
  string description = 4;
  string price = 5;
  bool is_active = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message ListProductsResponse {
  repeated ProductItems products = 1;
  string next_page_token = 2;
  int32 total_count = 3;
}

message BatchGetProductsRequest {
  repeated string ids = 1 [
      (google.api.field_behavior) = REQUIRED,
      (validate.rules).repeated.min_items = 1
  ];
}

message BatchGetProductsResponse {
  repeated Product products = 1;
}

message AdjustStockRequest {
  string product_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string.uuid = true
  ];
  int32 quantity = 2 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).int32 = {ignore_empty: true}
  ];
  string reason = 3 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string.min_len = 10
  ];
}

message StockResponse {
  string product_id = 1;
  int32 final_quantity = 2;
}

message ItemCheck {
  string product_id = 1;
  int32 quantity = 2;
}

message CheckStockRequest {
  repeated ItemCheck items = 1 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).repeated.min_items = 1
  ];
}

message StockRequest {
  repeated ItemCheck items = 1 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).repeated.min_items = 1
  ];
  string order_id = 2 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string.uuid = true
  ];
}

message CheckStockResponse {
  bool is_available = 1;
  repeated string out_of_stock_product_ids = 2;
}

message DynamicResponse {
  string message = 1;
  google.protobuf.Value data = 2;
}