syntax = "proto3";

package inventory_service.v1;

option go_package = "github.com/AlfariziYasir/transactions/common/proto/inventory";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";

service InventoryService {
  rpc CreateProduct(CreateProductRequest) returns (google.protobuf.Empty);
  rpc CheckStock(CheckStockRequest) returns (CheckStockResponse);
  rpc ReserveStock(ReserveStockRequest) returns (ReserveStockResponse);
  rpc ReleaseStock(ReleaseStockRequest) returns (ReleaseStockResponse);
  rpc GetProductDetails(GetProductDetailsRequest) returns (GetProductDetailsResponse);
  rpc UpdateProduct(google.protobuf.StringValue) returns (google.protobuf.Empty);
}

message StockItem {
  string product_id = 1;
  int32 quantity = 2;
}

message CheckStockRequest {
  repeated StockItem items = 1;
}

message CheckStockResponse {
  bool all_available = 1;
  repeated StockItem missing_items = 2; 
  repeated ProductPrice prices = 3; 
}

message ProductPrice {
  string product_id = 1;
  double unit_price = 2;
  string currency = 3;
}

message ReserveStockRequest {
  string order_id = 1;
  repeated StockItem items = 2;
  google.protobuf.Timestamp timestamp = 3;
}

message ReserveStockResponse {
  bool success = 1;
  string message = 2;
  repeated StockItem failed_items = 3;
}

message ReleaseStockRequest {
  string order_id = 1;
  string reason = 2;
  repeated StockItem items = 3;
}

message ReleaseStockResponse {
  bool success = 1;
  string message = 2;
}

message GetProductDetailsRequest {
  repeated string product_ids = 1;
}

message GetProductDetailsResponse {
  repeated ProductDetail products = 1;
}

message ProductDetail {
  string id = 1;
  string name = 2;
  string sku = 3;
  int32 current_stock = 4;
}

message ProductsRequest {
  string name = 1;
  string sku = 2;
  int32 current_stock = 3;
}

message CreateProductRequest {
  repeated ProductsRequest products = 1;
}

