version: '3.9'

services:
  postgres:
    image: postgres:17-alpine
    container_name: pg-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - transaction_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:alpine
    container_name: redis-db
    command: redis-server --requirepass redis123
    ports:
      - '6379:6379'
    networks:
      - transaction_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  rabbitmq:
    image: rabbitmq:management-alpine
    container_name: rmq-svc
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    networks:
      - transaction_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  user-svc:
    build:
      context: .
      dockerfile: ./services/user/Dockerfile
    container_name: user-svc
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_NAME=user-svc
      - APP_VERSION=v1.0.0
      - GRPC_PORT=50051
      - GRPC_HOST=0.0.0.0
      - HTTP_PORT=8080
      - ACCESS_TOKEN_KEY=access_token
      - REFRESH_TOKEN_KEY=refresh_token
      - ACCESS_TOKEN_MAX_AGE=30m
      - REFRESH_TOKEN_MAX_AGE=24h
      - DB_DSN=postgresql://user:postgres123@postgres:5432/user_db?sslmode=disable
      - LOG_LEVEL=debug
      - REDIS_ADDRESS=redis:6379
      - REDIS_PASSWORD=redis123
      - REDIS_DB=1
      - SWAGGER_PATH=./app/common/docs/user_api.swagger.json
    ports:
      - "50051:50051"
      - "8080:8080"
    networks:
      - transaction_net
  order-svc:
    build:
      context: .
      dockerfile: ./services/order/Dockerfile
    container_name: order-svc
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - APP_NAME=order-svc
      - APP_VERSION=v1.0.0
      - GRPC_PORT=50052
      - GRPC_HOST=0.0.0.0
      - HTTP_PORT=8081
      - ACCESS_TOKEN_KEY=access_token
      - REFRESH_TOKEN_KEY=refresh_token
      - DB_DSN=postgresql://user:postgres123@postgres:5432/order_db?sslmode=disable
      - LOG_LEVEL=debug
      - REDIS_ADDRESS=redis:6379
      - REDIS_PASSWORD=redis123
      - REDIS_DB=1
      - RABBITMQ_URL=amqp://admin:admin123@rabbitmq:5672/
      - SWAGGER_PATH=/app/common/docs/order_api.swagger.json
      - PAYMENT_CLIENT="payment-svc:8083"
    ports:
      - "50052:50052"
      - "8081:8081"
    networks:
      - transaction_net
  inventory-svc:
    build:
      context: .
      dockerfile: ./services/inventory/Dockerfile
    container_name: inventory-svc
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - APP_NAME=inventory-svc
      - APP_VERSION=v1.0.0
      - GRPC_PORT=50053
      - GRPC_HOST=0.0.0.0
      - HTTP_PORT=8082
      - ACCESS_TOKEN_KEY=access_token
      - REFRESH_TOKEN_KEY=refresh_token
      - DB_DSN=postgresql://user:postgres123@postgres:5432/inventory_db?sslmode=disable
      - LOG_LEVEL=debug
      - REDIS_ADDRESS=redis:6379
      - REDIS_PASSWORD=redis123
      - REDIS_DB=1
      - RABBITMQ_URL=amqp://admin:admin123@rabbitmq:5672/
      - SWAGGER_PATH=./app/common/docs/inventory_api.swagger.json
    ports:
      - "50053:50053"
      - "8082:8082"
    networks:
      - transaction_net

networks:
  transaction_net:
    driver: bridge
volumes:
  pg_data: